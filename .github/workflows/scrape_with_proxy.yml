name: Scrape with Residential Proxy

# This workflow uses GitHub cloud runners + residential proxy
# Requires PROXY_URL secret to be configured

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC

  workflow_dispatch:

jobs:
  scrape-with-proxy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install selenium-stealth

      - name: Verify proxy configuration
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then
            echo "::error::PROXY_URL secret not configured"
            exit 1
          fi
          echo "✅ Proxy URL configured (${#PROXY_URL} chars)"

      - name: Run enhanced scraper with proxy
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          # Use enhanced scraper that supports proxy
          python3 -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))
          from src.idealista_scraper_enhanced import EnhancedIdealistaScraper

          scraper = EnhancedIdealistaScraper(headless=True)

          # Scrape Ajuda
          ajuda_df = scraper.scrape_neighborhood('lisboa', 'ajuda', max_pages=5)
          if not ajuda_df.empty:
              scraper.save_to_csv(ajuda_df, 'data/lisboa_ajuda_listings.csv')

          # Scrape Alcantara
          alcantara_df = scraper.scrape_neighborhood('lisboa', 'alcantara', max_pages=5)
          if not alcantara_df.empty:
              scraper.save_to_csv(alcantara_df, 'data/lisboa_alcantara_listings.csv')
          "
        continue-on-error: true

      - name: Filter apartments
        run: python3 scripts/filter_and_analyze.py
        continue-on-error: true

      - name: Parse amenities
        run: python3 scripts/parse_descriptions.py
        continue-on-error: true

      - name: Calculate distances
        run: python3 scripts/rank_by_distance.py
        continue-on-error: true

      - name: Generate PDF report
        run: python3 scripts/generate_pdf_report.py
        continue-on-error: true

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/*.csv reports/*.pdf reports/*.txt
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Auto-update (proxy) $(date +'%Y-%m-%d %H:%M')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: proxy-reports-${{ github.run_number }}
          path: |
            reports/*.pdf
            reports/*.txt
          retention-days: 30
