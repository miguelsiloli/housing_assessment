name: Scrape Apartments

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'src/**'
      - '.github/workflows/scrape.yml'

  schedule:
    # Run daily at 9 AM UTC (10 AM Lisbon time)
    - cron: '0 9 * * *'

  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Needed to push commits and create releases

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Chrome installation
        run: |
          which google-chrome || which chromium-browser || which chrome
          google-chrome --version || chromium-browser --version || chrome --version

      - name: Create data directories
        run: |
          mkdir -p data reports

      - name: Run scraper
        run: python3 scripts/scrape_neighborhoods.py
        env:
          CI: true
          HEADLESS: true
        continue-on-error: true

      - name: Check scraper output
        if: always()
        run: |
          echo "=== Data files created ==="
          ls -lh data/ || echo "No data directory"
          if compgen -G "data/lisboa_*_listings.csv" > /dev/null; then
            echo "✓ Scraping succeeded - new data available"
            ls -1 data/lisboa_*_listings.csv | wc -l | xargs echo "Number of neighborhood files:"
          else
            echo "⚠️ Scraping may have failed - will try to use existing data"
          fi

      - name: Filter apartments under budget
        run: |
          if compgen -G "data/lisboa_*_listings.csv" > /dev/null; then
            python3 scripts/filter_and_analyze.py
          else
            echo "No new scraped data, skipping filter step"
          fi
        continue-on-error: true

      - name: Parse amenities from descriptions
        run: python3 scripts/parse_descriptions.py
        continue-on-error: true

      - name: Calculate distances to work/school
        run: python3 scripts/rank_by_distance.py
        continue-on-error: true

      - name: Generate PDF report
        run: |
          if [ -f "data/apartments_with_ner.csv" ]; then
            echo "Found processed data, generating PDF report..."
            python3 scripts/generate_pdf_report.py
          else
            echo "::warning::No processed data available for PDF generation"
            echo "This may be the first run or scraping failed. PDF will not be generated."
          fi
        continue-on-error: true

      - name: Scrape listing images for top 20
        run: |
          if [ -f "data/apartments_with_ner.csv" ]; then
            echo "Scraping images for top 20 listings..."
            python3 scripts/scrape_listing_images.py
          else
            echo "Skipping image scraping - no NER data available"
          fi
        continue-on-error: true

      - name: Generate enhanced PDF with images
        run: |
          if [ -f "data/apartments_with_images.csv" ]; then
            echo "Generating enhanced PDF report with images..."
            python3 scripts/generate_image_report.py
          else
            echo "Skipping enhanced report - no image data available"
          fi
        continue-on-error: true

      - name: Upload PDFs to GitHub Release
        run: |
          # Find PDFs
          NER_PDF=$(ls -t reports/*_ner_report.pdf 2>/dev/null | head -1)
          IMAGE_PDF=$(ls -t reports/*_apartments_with_images.pdf 2>/dev/null | head -1)

          if [ -z "$NER_PDF" ] && [ -z "$IMAGE_PDF" ]; then
            echo "No PDFs found, skipping release upload"
            exit 0
          fi

          RELEASE_TAG="latest-report"
          RELEASE_NAME="Latest Housing Analysis Reports"

          # Delete existing release and tag if they exist
          gh release delete "$RELEASE_TAG" -y 2>/dev/null || true
          git push origin :refs/tags/"$RELEASE_TAG" 2>/dev/null || true

          # Build release notes
          NOTES="**Updated:** $(date +'%Y-%m-%d %H:%M UTC')

          📊 Latest apartment analysis reports generated automatically by GitHub Actions.

          **Reports Available:**"

          # Build file list
          FILES=""

          if [ -n "$NER_PDF" ]; then
            NER_NAME=$(basename "$NER_PDF")
            NOTES="$NOTES
          - **NER Analysis Report**: \`https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/$NER_NAME\`"
            FILES="$NER_PDF"
          fi

          if [ -n "$IMAGE_PDF" ]; then
            IMAGE_NAME=$(basename "$IMAGE_PDF")
            NOTES="$NOTES
          - **Enhanced Report with Images**: \`https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/$IMAGE_NAME\`"
            FILES="$FILES $IMAGE_PDF"
          fi

          NOTES="$NOTES

          This release is automatically updated with each workflow run."

          # Create new release with PDF(s)
          gh release create "$RELEASE_TAG" $FILES \
            --title "$RELEASE_NAME" \
            --notes "$NOTES" \
            --latest

          if [ -n "$NER_PDF" ]; then
            echo "::notice::NER PDF available at: https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/$(basename $NER_PDF)"
          fi

          if [ -n "$IMAGE_PDF" ]; then
            echo "::notice::Image PDF available at: https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/$(basename $IMAGE_PDF)"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/*.csv reports/*.pdf reports/*.txt data/listing_images/*.jpg || true
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Auto-update apartment data $(date +'%Y-%m-%d %H:%M')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apartment-reports-${{ github.run_number }}
          path: |
            reports/*.pdf
            reports/*.txt
            data/apartments_with_ner.csv
            data/apartments_with_images.csv
            data/listing_images/*.jpg
          retention-days: 30
