name: Scrape with Self-Hosted Runner

# This workflow uses a self-hosted runner (your machine)
# Most reliable for anti-bot - uses your residential IP

on:
  schedule:
    # Run daily at 9 AM UTC (10 AM Lisbon time in winter, 11 AM in summer)
    - cron: '0 9 * * *'

  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  scrape-analyze-report:
    runs-on: self-hosted  # Uses YOUR machine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip3 install --break-system-packages -r requirements.txt || pip3 install -r requirements.txt

      - name: Run scraper (non-headless for better anti-bot)
        run: python3 scripts/scrape_neighborhoods.py
        env:
          DISPLAY: :0  # Use your display
        continue-on-error: true

      - name: Filter apartments under budget
        run: python3 scripts/filter_and_analyze.py
        continue-on-error: true

      - name: Parse amenities from descriptions
        run: python3 scripts/parse_descriptions.py
        continue-on-error: true

      - name: Calculate distances to work/school
        run: python3 scripts/rank_by_distance.py
        continue-on-error: true

      - name: Generate PDF report
        run: python3 scripts/generate_pdf_report.py
        continue-on-error: true

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/*.csv reports/*.pdf reports/*.txt
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Auto-update apartment data $(date +'%Y-%m-%d %H:%M')" && git push)
        continue-on-error: true

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apartment-reports-${{ github.run_number }}
          path: |
            reports/*.pdf
            reports/*.txt
            data/apartments_with_ner.csv
          retention-days: 30

      - name: Notification on failure
        if: failure()
        run: |
          echo "::warning::Scraper workflow failed - check for bot detection"
